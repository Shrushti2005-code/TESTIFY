<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("/TESTIFY/sw.js")
        .then((reg) =>
          console.log("✅ Service Worker registered:", reg.scope)
        )
        .catch((err) =>
          console.log("❌ SW registration failed:", err)
        );
    });
  }
</script>
